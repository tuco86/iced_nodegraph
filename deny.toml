# cargo-deny configuration. CI runs `cargo deny --log-level error check`
# (suppresses the intentional duplicate-version warnings); run plain
# `cargo deny check` locally to see them.
#
# Pre-publish supply-chain gate (see plan/dependency-audit): screens the full
# dependency tree for security advisories, license surprises, and unexpected
# sources before the first crates.io release.

[advisories]
# Fail on any crate whose installed version was yanked from the registry.
yanked = "deny"
ignore = [
    # paste is unmaintained (no security vulnerability). It is pulled in
    # transitively by the wgpu/iced stack and cannot be removed from here.
    # Tracked so the ignore stays auditable; revisit when upstream drops it.
    "RUSTSEC-2024-0436",
    # ttf-parser is unmaintained (no security vulnerability, no safe upgrade
    # available). Pulled in transitively via cosmic-text -> fontdb and
    # ab_glyph -> owned_ttf_parser, both deep in the iced/winit stack.
    # Tracked so the ignore stays auditable; revisit when upstream drops it.
    "RUSTSEC-2026-0192",
    # quick-xml < 0.41 DoS vectors on untrusted XML: NsReader namespace
    # memory exhaustion (2026-0195) and quadratic duplicate-attribute check
    # (2026-0194). Only dependent is wayland-scanner (build-time proc-macro,
    # latest 0.31.10 pins quick-xml ^0.39, no upgrade path yet). It parses
    # bundled, trusted Wayland protocol XML at compile time, so the
    # untrusted-input vector does not apply. Revisit when wayland-scanner
    # moves to quick-xml >= 0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
# Permissive allowlist appropriate for an MIT-licensed library. Every entry is
# present in the current dependency tree (verified via `cargo deny list`).
# Copyleft (GPL/LGPL) is intentionally absent: the crates that offer those
# (self_cell, r-efi) are dual-licensed and satisfied by MIT/Apache-2.0.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "Unicode-3.0",
    # Weak (file-level) copyleft; pulled in by `directories` (option-ext).
    # Linking against it does not affect this crate's MIT licensing.
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
# The wgpu/winit/iced tree legitimately carries duplicate versions of common
# crates (bitflags, hashbrown, windows-sys, ...). Surface them without failing.
multiple-versions = "warn"
wildcards = "deny"
# The demos depend on the in-tree crates via `*` path dependencies (the
# workspace pattern). Those are local, not registry wildcards, so allow them
# while still denying real `*` version requirements on published crates.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# Only the public registry is allowed. The in-tree crates are path
# dependencies, which are not registry/git sources and need no entry here.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
