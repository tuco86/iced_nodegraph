name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Native-only. The wasm32-unknown-unknown target check stays in the local
# pre-push checklist (see CLAUDE.md).
env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # The iced_nodegraph_sdf pixel tests render through wgpu and need a GPU
      # adapter. The runner has none, so provide Mesa's software Vulkan driver
      # (lavapipe); wgpu's Vulkan backend then finds it headlessly.
      - name: Install software Vulkan (lavapipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers libvulkan1 vulkan-tools
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ci-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -p iced_nodegraph -p iced_nodegraph_sdf -- -D warnings

      - name: Test (iced_nodegraph)
        run: cargo test -p iced_nodegraph

      # The SDF pixel tests each spin up a full wgpu device and render through
      # the software Vulkan driver. Running them in parallel oversubscribes the
      # runner's few CPU cores and can make a device poll exceed its timeout, so
      # serialize them - lavapipe handles one device at a time reliably.
      - name: Test (iced_nodegraph_sdf, serialized GPU tests)
        run: cargo test -p iced_nodegraph_sdf -- --test-threads=1

  semver:
    name: Semver checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so a git revision can serve as the semver baseline
          # before the first crates.io publish.
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-semver-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-semver-

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: Run cargo-semver-checks
        run: |
          # Baseline is the most recent release tag (v*). Pre-publish there are
          # no tags, so the gate is a no-op: deliberate API changes during
          # pre-1.0 finalization stay green. The first tagged release sets the
          # baseline, after which this gate hard-fails on any unintended public
          # API break since that release.
          TAG="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$TAG" ]; then
            echo "No release tag (v*) yet; pre-publish, skipping the semver gate."
            echo "Tag the first release to activate the public-API lock."
            exit 0
          fi
          echo "Comparing public API against last release tag $TAG"
          cargo semver-checks \
            --baseline-rev "$TAG" \
            -p iced_nodegraph \
            -p iced_nodegraph_sdf

  deny:
    name: Dependency audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        run: cargo deny --log-level error check
